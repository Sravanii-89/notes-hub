{% extends "base.html" %}
{% block content %}

<h2>Welcome, {{ user[0] }} 👋</h2>

<div class="dashboard">

    <!-- STATS -->
    <div class="stat-card">
        <h3>{{ total_notes }}</h3>
        <p>Total Notes</p>
    </div>

    <div class="stat-card">
        <h3>{{ total_downloads }}</h3>
        <p>Total Downloads</p>
    </div>

</div>

<!-- USER PROFILE -->
<div class="profile-card">
    <h3>👤 Profile</h3>
    <p><b>Name:</b> {{ user[0] }}</p>
    <p><b>Branch:</b> {{ user[1] }}</p>
    <p><b>Year:</b> {{ user[2] }}</p>
</div>

{% endblock %}
