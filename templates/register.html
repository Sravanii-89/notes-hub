{% extends "base.html" %}
{% block content %}

<div class="auth-container">

    <div class="auth-box">
        <h2>Register</h2>

        <form method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <select name="branch">
                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>MECH</option>
                <option>CIVIL</option>
                <option>IT</option>
            </select>

            <select name="year">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
            </select>

            <button type="submit">Register</button>
        </form>

    </div>

</div>

{% endblock %}
