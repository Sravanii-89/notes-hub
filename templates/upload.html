{% extends "base.html" %}
{% block content %}

<h2 class="section-title">📤 Upload Notes</h2>

<div class="upload-container">

    <form method="POST" enctype="multipart/form-data" class="upload-box">

        <label>Title</label>
        <input type="text" name="title" placeholder="Enter note title" required>

        <label>Branch</label>
        <input type="text" name="branch" value="{{ branch }}" readonly>

        <label>Year</label>
        <input type="text" name="year" value="{{ year }}" readonly>

        <label>Subject</label>
        <input type="text" name="subject" value="{{ subject }}" readonly>

        <label>Upload PDF</label>
        <input type="file" name="file" accept="application/pdf" required>

        <button type="submit">🚀 Upload PDF</button>

    </form>

</div>

{% endblock %}
