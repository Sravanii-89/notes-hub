<!DOCTYPE html>
<html>
<head>
<title>GMR Notes Hub</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>📚 GMR Notes Hub</div>

    <div>
        <button onclick="toggleTheme()">🌓</button>
        <a href="/home">Home</a>
        <a href="/upload">Upload</a>
        <a href="/">Logout</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>🎓 GMRIT Deemed to be University</h1>
</div>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<!-- FOOTER -->
<div class="footer">
    Made by <b>SRAVANI MULLU</b> |
    <a href="https://www.linkedin.com/in/sravani-m-25a53b33a/" target="_blank">
        LinkedIn Profile
    </a>
</div>

<!-- THEME SCRIPT -->
<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
