<!DOCTYPE html>
<html>
<head>
    <title>GMR Notes Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="brand">📚 GMR Hub</div>

        <a href="/home"><i class="ri-home-4-line"></i> Home</a>
        <a href="/upload"><i class="ri-upload-cloud-line"></i> Upload</a>
        <a href="/"><i class="ri-logout-box-line"></i> Logout</a>

    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">

            <h3>Notes Portal</h3>

            <div class="top-right">
                <span id="themeToggle" onclick="toggleTheme()">🌙</span>

                <!-- USER AVATAR -->
                <div class="avatar">
                    {{ session.get("user_id", "U") }}
                </div>
            </div>

        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    const icon = document.getElementById("themeToggle");

    if (document.body.classList.contains("dark")) {
        icon.textContent = "🌞";
        localStorage.setItem("theme", "dark");
    } else {
        icon.textContent = "🌙";
        localStorage.setItem("theme", "light");
    }
}

window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "🌞";
    }

    document.getElementById("loader").style.display = "none";
};
</script>

</body>
</html>
