<!DOCTYPE html>
<html>
<head>
    <title>GMR Notes Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">📚 GMR Hub</div>

        <a href="/home"><i class="ri-home-4-line"></i> Home</a>
        <a href="/upload"><i class="ri-upload-cloud-line"></i> Upload</a>
        <a href="/"><i class="ri-logout-box-line"></i> Logout</a>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <h3>Notes Portal</h3>

            <div>
                <span id="themeToggle" onclick="toggleTheme()">🌙</span>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content fade-in">
            {% block content %}{% endblock %}
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-container">

                <div>
                    📚 <b>GMR Notes Hub</b>
                </div>

                <div>
                    Made by <b>SRAVANI MULLU</b>
                </div>

                <div>
                    <a href="https://www.linkedin.com/in/sravani-m-25a53b33a/" target="_blank" style="color:white;">
                        LinkedIn
                    </a>
                </div>

            </div>
        </footer>

    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    const icon = document.getElementById("themeToggle");

    if (document.body.classList.contains("dark")) {
        icon.textContent = "🌞";
        localStorage.setItem("theme", "dark");
    } else {
        icon.textContent = "🌙";
        localStorage.setItem("theme", "light");
    }
}

window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "🌞";
    }
};
</script>

</body>
</html>
