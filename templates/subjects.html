{% extends "base.html" %}
{% block content %}
<h2 class="section-title">{{ branch }} - Year {{ year }}</h2>

<div class="grid">
    {% for subject in subjects %}
        <a href="/notes/{{ branch }}/{{ year }}/{{ subject }}" class="card">
            {{ subject }}
        </a>
    {% endfor %}
</div>
{% endblock %}
