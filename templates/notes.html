{% extends "base.html" %}
{% block content %}

<h2>{{ subject }} Notes</h2>

<form action="/upload" method="GET">
    <input type="hidden" name="branch" value="{{ branch }}">
    <input type="hidden" name="year" value="{{ year }}">
    <input type="hidden" name="subject" value="{{ subject }}">
    <button type="submit">➕ Upload Notes</button>
</form>

<br>

{% if notes %}
    {% for note in notes %}
    <div class="note-card">
        <h3>{{ note[1] }}</h3>

        <!-- PDF PREVIEW -->
        <iframe src="{{ note[5] }}" class="pdf-viewer"></iframe>

        <!-- DOWNLOAD -->
        <a href="/download/{{ note[0] }}">
            <button>📥 Download</button>
        </a>
    </div>
    {% endfor %}
{% else %}
    <div class="note-card">
        <h3>No Notes Uploaded Yet 😢</h3>
        <p>Click "Upload Notes" to add one.</p>
    </div>
{% endif %}

{% endblock %}
