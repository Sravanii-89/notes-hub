{% extends "base.html" %}
{% block content %}

<div class="breadcrumb">
    <a href="/home">Home</a> >
    <a href="/branch/{{ branch }}">{{ branch }}</a> >
    <a href="/year/{{ branch }}/{{ year }}">Year {{ year }}</a> >
    <span>{{ subject }}</span>
</div>

<h2 class="section-title">📘 {{ subject }} Notes</h2>

{% if notes %}

<div class="grid">
    {% for note in notes %}
    <div class="card">
        <h4>{{ note[0] }}</h4>
        <a href="{{ note[1] }}" target="_blank">
            📥 Download
        </a>
    </div>
    {% endfor %}
</div>

{% else %}

<div class="card">
    😢 No notes uploaded yet <br><br>
    You are the first to upload!
</div>

<div style="text-align:center; margin-top:20px;">
<a href="/upload?branch={{ branch }}&year={{ year }}&subject={{ subject }}">
        <button>Upload PDF</button>
    </a>
</div>

{% endif %}

{% endblock %}
