{% extends "base.html" %}
{% block content %}

<h2>{{ subject }} Notes</h2>

{% if notes %}

    {% for note in notes %}
    <div class="note-card">

        <h3>{{ note[1] }}</h3>

        <a href="{{ note[2] }}" target="_blank">📄 View</a>

        <a href="/download/{{ note[0] }}">
            <button>Download</button>
        </a>

    </div>
    {% endfor %}

{% else %}

    <p>No notes yet</p>

{% endif %}

{% endblock %}
