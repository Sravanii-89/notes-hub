{% extends "base.html" %}
{% block content %}

<h2>{{ subject }} Notes</h2>

<a href="/upload?branch={{ branch }}&year={{ year }}&subject={{ subject }}">
    <button>Upload Notes</button>
</a>

{% for note in notes %}
<div class="note-card">
    <h3>{{ note[1] }}</h3>

    <iframe src="{{ note[2] }}" class="pdf-viewer"></iframe>

    <a href="/download/{{ note[0] }}">
        <button>Download</button>
    </a>
</div>
{% endfor %}

{% endblock %}
